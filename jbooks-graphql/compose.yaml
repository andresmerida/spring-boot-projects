services:
  grafana-lgtm:
    image: 'grafana/otel-lgtm:0.28.0'
    ports:
      - '3000:3000'
      - '4317'
      - '4318'
  postgres:
    image: 'postgres:18.1-alpine'
    container_name: postgres
    environment:
      - 'POSTGRES_DB=jbooks'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5433:5432'
