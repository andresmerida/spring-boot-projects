spring:
  application:
    name: transactions

  datasource:
    url: jdbc:postgresql://localhost:15432/my_db
    username: postgres
    password: postgres

  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        generate_statistics: true